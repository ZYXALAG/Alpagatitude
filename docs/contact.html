<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="page_contact_title">Contact — Alpagatitude</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>

<header class="site-header" id="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo"><span class="logo-icon">🦙</span><span class="logo-text">Alpagatitude</span></a>
    <nav class="main-nav" id="main-nav">
      <ul>
        <li><a href="index.html"       data-i18n="nav_home"></a></li>
        <li><a href="chambres.html"    data-i18n="nav_rooms"></a></li>
        <li><a href="activites.html"   data-i18n="nav_activities"></a></li>
        <li><a href="contact.html"     class="active" data-i18n="nav_contact"></a></li>
        <li><a href="reservation.html" class="btn-nav" data-i18n="nav_reservation"></a></li>
      </ul>
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="fr" onclick="setLang('fr')" title="Français">🇫🇷</button>
        <button class="lang-btn"        data-lang="en" onclick="setLang('en')" title="English">🇬🇧</button>
        <button class="lang-btn"        data-lang="es" onclick="setLang('es')" title="Español">🇪🇸</button>
      </div>
    </nav>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- PAGE HERO -->
<div class="page-hero" style="background:linear-gradient(135deg,rgba(46,90,62,.85),rgba(184,134,11,.6))">
  <div class="container">
    <h1 data-i18n="contact_title"></h1>
    <p data-i18n="contact_subtitle"></p>
  </div>
</div>

<!-- CONTACT SECTION -->
<section class="section">
  <div class="container">
    <div class="contact-layout">

      <!-- Info cards -->
      <div class="contact-info">
        <div class="contact-card">
          <div class="contact-card-icon">📍</div>
          <h3 data-i18n="contact_address"></h3>
          <p>123 Route des Alpagas<br>La Montagne, France</p>
        </div>
        <div class="contact-card">
          <div class="contact-card-icon">📞</div>
          <h3 data-i18n="contact_phone"></h3>
          <p><a href="tel:+33600000000">+33 6 00 00 00 00</a></p>
        </div>
        <div class="contact-card">
          <div class="contact-card-icon">✉️</div>
          <h3 data-i18n="contact_email_label"></h3>
          <p><a href="mailto:contact@alpagatitude.com">contact@alpagatitude.com</a></p>
        </div>
        <div class="contact-card">
          <div class="contact-card-icon">🕐</div>
          <h3 data-i18n="contact_hours_title"></h3>
          <p data-i18n="contact_hours"></p>
        </div>
      </div>

      <!-- Contact form -->
      <div class="form-wrap">
        <div id="form-success" class="alert alert-success" style="display:none">
          <strong>✅</strong> <span data-i18n="contact_success"></span>
        </div>

        <!-- ⚠️  Replace YOUR_FORMSPREE_ID with your real Formspree form ID -->
        <!-- Create a free form at https://formspree.io then paste the ID here -->
        <form id="contact-form"
              action="https://formspree.io/f/YOUR_FORMSPREE_ID"
              method="POST"
              novalidate>

          <input type="hidden" name="_subject" value="Message — Alpagatitude">
          <input type="text"   name="_gotcha"  style="display:none">

          <div class="form-row">
            <div class="form-group">
              <label for="first_name" data-i18n="contact_first_name"></label>
              <input type="text" id="first_name" name="first_name" class="form-control" required autocomplete="given-name">
            </div>
            <div class="form-group">
              <label for="last_name"  data-i18n="contact_last_name"></label>
              <input type="text" id="last_name"  name="last_name"  class="form-control" required autocomplete="family-name">
            </div>
          </div>

          <div class="form-group">
            <label for="email" data-i18n="contact_email_label"></label>
            <input type="email" id="email" name="email" class="form-control" required autocomplete="email">
          </div>

          <div class="form-group">
            <label for="subject" data-i18n="contact_subject"></label>
            <input type="text" id="subject" name="subject" class="form-control">
          </div>

          <div class="form-group">
            <label for="message" data-i18n="contact_message"></label>
            <textarea id="message" name="message" class="form-control" rows="6" required></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg" data-i18n="contact_submit"></button>
          </div>
        </form>
      </div>

    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand">
        <div class="footer-logo">🦙 Alpagatitude</div>
        <p data-i18n="footer_tagline"></p>
      </div>
      <div class="footer-links">
        <h4 data-i18n="footer_links"></h4>
        <ul>
          <li><a href="index.html"       data-i18n="nav_home"></a></li>
          <li><a href="chambres.html"    data-i18n="nav_rooms"></a></li>
          <li><a href="activites.html"   data-i18n="nav_activities"></a></li>
          <li><a href="reservation.html" data-i18n="nav_reservation"></a></li>
          <li><a href="contact.html"     data-i18n="nav_contact"></a></li>
        </ul>
      </div>
      <div class="footer-contact">
        <h4 data-i18n="footer_contact_title"></h4>
        <p>📍 123 Route des Alpagas, La Montagne</p>
        <p>📞 +33 6 00 00 00 00</p>
        <p>✉️ contact@alpagatitude.com</p>
      </div>
    </div>
  </div>
  <div class="footer-bottom">
    <div class="container">
      <span>© 2026 Alpagatitude. <span data-i18n="footer_rights"></span></span>
    </div>
  </div>
</footer>

<script src="js/i18n.js"></script>
<script src="js/main-static.js"></script>
<script>
  if (window.location.search.includes('success')) {
    document.getElementById('form-success').style.display = 'block';
    document.getElementById('contact-form').style.display  = 'none';
  }
  applyLang();
</script>
</body>
</html>
