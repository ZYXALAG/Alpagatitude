<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="skyr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90c8f0"/>
      <stop offset="100%" stop-color="#c8e4d8"/>
    </linearGradient>
    <linearGradient id="mount1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6080a0"/>
      <stop offset="100%" stop-color="#8090b0"/>
    </linearGradient>
    <linearGradient id="mount2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4d7a60"/>
      <stop offset="100%" stop-color="#6a9e78"/>
    </linearGradient>
  </defs>
  <!-- Ciel -->
  <rect width="800" height="500" fill="url(#skyr)"/>
  <!-- Nuages -->
  <ellipse cx="150" cy="70" rx="75" ry="25" fill="#fff" opacity="0.8"/>
  <ellipse cx="105" cy="78" rx="50" ry="20" fill="#fff" opacity="0.8"/>
  <ellipse cx="195" cy="78" rx="50" ry="20" fill="#fff" opacity="0.8"/>
  <ellipse cx="580" cy="55" rx="65" ry="22" fill="#fff" opacity="0.7"/>
  <ellipse cx="540" cy="62" rx="44" ry="17" fill="#fff" opacity="0.7"/>
  <ellipse cx="620" cy="62" rx="44" ry="17" fill="#fff" opacity="0.7"/>
  <ellipse cx="380" cy="90" rx="50" ry="17" fill="#fff" opacity="0.6"/>
  <!-- Montagne au fond (enneigée) -->
  <polygon points="400,30 200,320 600,320" fill="url(#mount1)"/>
  <polygon points="400,30 360,130 440,130" fill="#f0f4f8"/>
  <!-- Montagne gauche -->
  <polygon points="160,60 0,300 340,300" fill="url(#mount1)" opacity="0.7"/>
  <polygon points="160,60 130,130 190,130" fill="#e8edf2" opacity="0.8"/>
  <!-- Montagne droite -->
  <polygon points="640,80 460,310 800,310" fill="url(#mount1)" opacity="0.7"/>
  <polygon points="640,80 610,140 670,140" fill="#e8edf2" opacity="0.8"/>
  <!-- Collines vertes -->
  <ellipse cx="200" cy="360" rx="320" ry="120" fill="url(#mount2)" opacity="0.65"/>
  <ellipse cx="600" cy="350" rx="300" ry="120" fill="url(#mount2)" opacity="0.65"/>
  <rect x="0" y="350" width="800" height="150" fill="#5a9e6f"/>
  <ellipse cx="400" cy="352" rx="460" ry="24" fill="#4a9060" opacity="0.4"/>
  <!-- Sentier en lacets -->
  <path d="M 400 500 Q 380 450 360 420 Q 340 390 370 370 Q 400 350 430 340 Q 460 330 450 310 Q 440 290 410 280" stroke="#d4b870" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M 400 500 Q 380 450 360 420 Q 340 390 370 370 Q 400 350 430 340 Q 460 330 450 310 Q 440 290 410 280" stroke="#e8d090" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="18,12" opacity="0.5"/>
  <!-- Randonneurs (silhouettes) -->
  <!-- Randonneur 1 -->
  <circle cx="385" cy="370" r="14" fill="#c4a882"/>
  <rect x="378" y="384" width="14" height="38" rx="5" fill="#2e5a3e"/>
  <rect x="362" y="392" width="18" height="7" rx="3" fill="#2e5a3e"/>
  <rect x="376" y="422" width="10" height="28" rx="4" fill="#5a4030"/>
  <rect x="390" y="422" width="10" height="28" rx="4" fill="#5a4030"/>
  <!-- Sac à dos -->
  <rect x="380" y="382" width="20" height="26" rx="6" fill="#b8860b"/>
  <!-- Bâton de marche -->
  <line x1="365" y1="388" x2="350" y2="440" stroke="#8b5e3c" stroke-width="4" stroke-linecap="round"/>
  <!-- Randonneur 2 -->
  <circle cx="430" cy="360" r="13" fill="#d4b898"/>
  <rect x="423" y="373" width="14" height="36" rx="5" fill="#8b3030"/>
  <rect x="408" y="381" width="17" height="7" rx="3" fill="#8b3030"/>
  <rect x="421" y="409" width="10" height="26" rx="4" fill="#3a2a20"/>
  <rect x="435" y="409" width="10" height="26" rx="4" fill="#3a2a20"/>
  <rect x="425" y="371" width="18" height="24" rx="6" fill="#2e5a3e"/>
  <line x1="410" y1="380" x2="396" y2="428" stroke="#8b5e3c" stroke-width="4" stroke-linecap="round"/>
  <!-- Alpaga (avec les randonneurs) -->
  <ellipse cx="460" cy="380" rx="44" ry="27" fill="#f5f0e8"/>
  <ellipse cx="454" cy="372" rx="42" ry="22" fill="#fff" opacity="0.5"/>
  <rect x="440" y="400" width="11" height="34" rx="5" fill="#e0d0bc"/>
  <rect x="457" y="401" width="11" height="36" rx="5" fill="#e0d0bc"/>
  <rect x="474" y="401" width="11" height="34" rx="5" fill="#e0d0bc"/>
  <rect x="490" y="398" width="11" height="31" rx="5" fill="#e0d0bc"/>
  <ellipse cx="497" cy="372" rx="19" ry="16" fill="#f5f0e8"/>
  <ellipse cx="505" cy="358" rx="10" ry="14" fill="#f5f0e8"/>
  <ellipse cx="498" cy="346" rx="5" ry="8" fill="#f5f0e8" transform="rotate(-12,498,346)"/>
  <ellipse cx="512" cy="344" rx="5" ry="8" fill="#f5f0e8" transform="rotate(12,512,344)"/>
  <circle cx="510" cy="354" r="3" fill="#3a2a1a"/>
  <!-- Laisse reliant alpaga au randonneur -->
  <path d="M 440 376 Q 430 370 424 373" stroke="#8b5e3c" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Fleurs alpines -->
  <circle cx="310" cy="355" r="6" fill="#ffffff" opacity="0.9"/>
  <circle cx="298" cy="362" r="5" fill="#f9e46a"/>
  <circle cx="320" cy="368" r="6" fill="#f9b0c0"/>
  <circle cx="560" cy="358" r="6" fill="#f9e46a"/>
  <circle cx="572" cy="350" r="5" fill="#ffffff" opacity="0.9"/>
  <!-- Aigle / oiseau lointain -->
  <path d="M 700 120 l 12 6 l 12 -6" stroke="#555" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 720 115 l 10 5 l 10 -5" stroke="#555" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
