  <ellipse cx="657" cy="327" rx="4" ry="7" fill="#f5f0e8" transform="rotate(-15,657,327)"/>
  <ellipse cx="671" cy="326" rx="4" ry="7" fill="#f5f0e8" transform="rotate(15,671,326)"/>
