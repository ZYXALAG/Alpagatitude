  <ellipse cx="654" cy="342" rx="50" ry="28" fill="#fff" opacity="0.5"/>
  <rect x="638" y="376" width="12" height="40" rx="5" fill="#e0d0bc"/>
  <rect x="656" y="378" width="12" height="42" rx="5" fill="#e0d0bc"/>
  <rect x="674" y="378" width="12" height="40" rx="5" fill="#e0d0bc"/>
  <rect x="692" y="374" width="12" height="36" rx="5" fill="#e0d0bc"/>
